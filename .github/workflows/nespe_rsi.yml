name: Daily NEPSE RSI Analysis

on:
  schedule:
    - cron: '15 18 * * *'
  push:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install pandas for creating Excel files if needed
        pip install pandas

    - name: Run RSI Analysis
      run: python nepse_rsi_analyzer.py

    - name: Create date-based Excel file
      run: |
        # Get current date in YYYY-MM-DD format (Nepal time)
        TZ='Asia/Kathmandu'
        DATE=$(date +'%Y-%m-%d')
        
        # Create directory if it doesn't exist
        mkdir -p NEPSE_Reports
        
        # Check if any Excel files exist
        if ls NEPSE_Reports/*.xls* 1> /dev/null 2>&1; then
          echo "Excel files exist, using the most recent one"
          # Find the most recently created Excel file
          REPORT_FILE=$(ls -t NEPSE_Reports/*.xls* | head -1)
          # Extract filename and extension
          FILENAME=$(basename -- "$REPORT_FILE")
          EXTENSION="${FILENAME##*.}"
          # Rename to date-based filename
          mv "$REPORT_FILE" "NEPSE_Reports/$DATE.$EXTENSION"
        else
          echo "No Excel files found. Creating a placeholder."
          # Create a simple Excel file with pandas
          python -c "import pandas as pd; pd.DataFrame({'Message': ['No data available for $DATE']}).to_excel('NEPSE_Reports/$DATE.xlsx', index=False)"
        fi

    - name: Commit and push results
      run: |
        TZ='Asia/Kathmandu'
        DATE=$(date +'%Y-%m-%d')
        
        # Configure git
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@users.noreply.github.com"
        
        # Add and commit
        git add NEPSE_Reports/
        git commit -m "Add NEPSE report for $DATE"
        git push

    - name: Upload results as artifact
      uses: actions/upload-artifact@v4
      with:
        name: nepse-reports
        path: |
          NEPSE_Reports/
          nepse_analysis.log