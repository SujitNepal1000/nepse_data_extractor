name: Daily NEPSE RSI Analysis

on:
  schedule:
    - cron: '15 18 * * *'
  push:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Required for git history operations

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run RSI Analysis
      run: python nepse_rsi_analyzer.py

    - name: Commit and push results
      run: |
        # Get current date in YYYY-MM-DD format (Nepal time)
        TZ='Asia/Kathmandu'
        DATE=$(date +'%Y-%m-%d')
        
        # Configure git
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@users.noreply.github.com"
        
        # Check if report file exists
        if [ -f "NEPSE_Reports/$DATE.xlsx" ]; then
          git add NEPSE_Reports/$DATE.xlsx
          git add NEPSE_Reports/
          git commit -m "Add NEPSE report for $DATE"
          git push
        elif [ -f "NEPSE_Reports/$DATE.xls" ]; then
          git add NEPSE_Reports/$DATE.xls
          git add NEPSE_Reports/
          git commit -m "Add NEPSE report for $DATE"
          git push
        else
          echo "Report file for $DATE not found!"
          exit 1
        fi

    - name: Upload results as artifact
      uses: actions/upload-artifact@v4
      with:
        name: nepse-reports
        path: |
          NEPSE_Reports/
          nepse_analysis.log