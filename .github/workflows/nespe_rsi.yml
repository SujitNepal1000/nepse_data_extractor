name: Daily NEPSE RSI Analysis

on:
  schedule:
    - cron: '30 2 * * *'  # 02:30 UTC = 08:15 Nepal Time
  push:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create reports directory
        run: mkdir -p NEPSE_Reports

      - name: Run RSI Analysis
        run: python nepse_rsi_analyzer.py || true

      - name: Rename report with date
        run: |
          # Set Nepal timezone
          TZ='Asia/Kathmandu'
          DATE=$(date +'%Y-%m-%d')
          
          # Find the most recent Excel file
          REPORT_FILE=$(ls -t NEPSE_Reports/*.xls* | head -1)
          
          if [ -n "$REPORT_FILE" ]; then
            # Rename with date
            FILENAME=$(basename -- "$REPORT_FILE")
            EXTENSION="${FILENAME##*.}"
            mv "$REPORT_FILE" "NEPSE_Reports/$DATE.$EXTENSION"
          else
            echo "No report file found"
          fi

      - name: Commit and Push Daily Report
        run: |
          # Configure git with proper credentials
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@users.noreply.github.com"
          
          # Get current branch name
          BRANCH=${GITHUB_REF#refs/heads/}
          
          # Set Nepal timezone for date
          TZ='Asia/Kathmandu'
          DATE=$(date +'%Y-%m-%d')
          
          # Add and commit changes
          git add NEPSE_Reports/
          
          # Check if there are changes to commit
          if ! git diff-index --quiet HEAD --; then
            git commit -m "Add NEPSE report for $DATE"
            git push origin HEAD:$BRANCH
          else
            echo "No changes to commit"
          fi

      - name: Upload Daily Report
        uses: actions/upload-artifact@v4
        with:
          name: nepse-daily-report
          path: NEPSE_Reports/