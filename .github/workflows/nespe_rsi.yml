name: Daily NEPSE RSI Analysis

on:
  schedule:
    - cron: '15 18 * * *'
  push:
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}  # Add token for write access

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pandas openpyxl  # Ensure Excel libraries are installed

    - name: Run RSI Analysis
      run: python nepse_rsi_analyzer.py

    - name: Create or rename Excel file
      run: |
        # Get current date in YYYY-MM-DD format (Nepal time)
        TZ='Asia/Kathmandu'
        DATE=$(date +'%Y-%m-%d')
        
        # Create directory if it doesn't exist
        mkdir -p NEPSE_Reports
        
        # Check if any Excel files exist
        if compgen -G "NEPSE_Reports/*.xls*" > /dev/null; then
          echo "Excel files exist, using the most recent one"
          # Find the most recently created Excel file
          REPORT_FILE=$(ls -t NEPSE_Reports/*.xls* | head -1)
          # Extract filename and extension
          FILENAME=$(basename -- "$REPORT_FILE")
          EXTENSION="${FILENAME##*.}"
          # Rename to date-based filename
          mv "$REPORT_FILE" "NEPSE_Reports/$DATE.$EXTENSION"
        else
          echo "No Excel files found. Creating placeholder."
          # Create a simple Excel file with pandas
          python -c "import pandas as pd; pd.DataFrame({'Date': ['$DATE'], 'Status': ['No data available']}).to_excel('NEPSE_Reports/$DATE.xlsx', index=False)"
        fi

    - name: Commit and push results
      run: |
        # Configure git
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@users.noreply.github.com"
        
        # Get current branch name
        BRANCH=${GITHUB_REF#refs/heads/}
        
        # Add and commit changes
        git add NEPSE_Reports/
        git commit -m "Add NEPSE report for $(date -d 'today Asia/Kathmandu' +'%Y-%m-%d')"
        
        # Push changes using token authentication
        git push https://$GITHUB_ACTOR:${{ secrets.GITHUB_TOKEN }}@github.com/$GITHUB_REPOSITORY.git $BRANCH

    - name: Upload results as artifact
      uses: actions/upload-artifact@v4
      with:
        name: nepse-reports
        path: |
          NEPSE_Reports/
          nepse_analysis.log