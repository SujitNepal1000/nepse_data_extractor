name: Nepse Data Updater

on:
  push:
    branches:
      - main

  schedule:
    # 4 PM Nepal Time = 10:15 UTC
    - cron: '15 10 * * 0-4'

  workflow_dispatch:   # ✅ Enables manual run from GitHub UI

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies for Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          xvfb \
          libxi6 \
          libnss3 \
          libxss1 \
          libasound2t64 \
          wget \
          unzip
        wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" > /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Install Python dependencies
      run: pip install -r requirements.txt

    - name: Run Nepse data extractor
      env:
        GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python nepse_analysis.py

    - name: Test GSheet auth
      env:
        GSP_SA_KEY: ${{ secrets.GSP_SA_KEY }}
        GSHEET_ID: ${{ secrets.GSHEET_ID }}
      run: python tests/test_gsheet_auth.py

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: nepse-artifacts
        path: |
          logs/
          output/*.xlsx